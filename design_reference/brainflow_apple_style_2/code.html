<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Newsreader:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f9f9fb",
                        "surface-container-highest": "#dde3e9",
                        "on-background": "#2d3338",
                        "primary-dim": "#485362",
                        "surface-tint": "#545f6e",
                        "inverse-surface": "#0c0e10",
                        "surface-bright": "#f9f9fb",
                        "on-secondary": "#faf8fe",
                        "surface-container-low": "#f2f4f6",
                        "error-dim": "#4e0309",
                        "outline-variant": "#acb3b8",
                        "on-error": "#fff7f6",
                        "on-primary-fixed": "#35404e",
                        "tertiary-dim": "#684f2d",
                        "inverse-on-surface": "#9c9d9f",
                        "surface-container-lowest": "#ffffff",
                        "secondary-dim": "#525357",
                        "on-error-container": "#752121",
                        "secondary": "#5e5f63",
                        "primary": "#545f6e",
                        "on-primary-fixed-variant": "#515c6b",
                        "primary-container": "#d8e3f5",
                        "on-tertiary-container": "#644c2a",
                        "on-primary-container": "#485361",
                        "on-primary": "#f5f7ff",
                        "secondary-container": "#e3e2e7",
                        "primary-fixed": "#d8e3f5",
                        "on-secondary-fixed": "#3e3f43",
                        "on-secondary-fixed-variant": "#5b5b60",
                        "on-surface-variant": "#596065",
                        "surface-dim": "#d3dbe2",
                        "primary-fixed-dim": "#cad5e7",
                        "tertiary": "#755a38",
                        "secondary-fixed": "#e3e2e7",
                        "on-secondary-container": "#515156",
                        "tertiary-container": "#fedaae",
                        "background": "#f9f9fb",
                        "on-tertiary-fixed-variant": "#6f5533",
                        "outline": "#757c81",
                        "secondary-fixed-dim": "#d5d4d9",
                        "surface-variant": "#dde3e9",
                        "surface-container": "#ebeef2",
                        "tertiary-fixed-dim": "#efcca1",
                        "error-container": "#fe8983",
                        "error": "#9f403d",
                        "on-tertiary-fixed": "#50391a",
                        "inverse-primary": "#d2def0",
                        "on-surface": "#2d3338",
                        "tertiary-fixed": "#fedaae",
                        "surface-container-high": "#e4e9ee",
                        "on-tertiary": "#fff7f3"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        .canvas-grid {
            background-image: radial-gradient(#acb3b8 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .organic-line {
            stroke: #acb3b8;
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
        }
        .organic-line-accent {
            stroke: #545f6e;
            stroke-width: 2;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 border-b border-slate-200/20 dark:border-slate-800/20 bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm shadow-slate-900/5 flex justify-between items-center px-6 h-12 w-full">
<div class="flex items-center gap-4">
<span class="font-serif text-lg italic text-slate-800 dark:text-slate-100">BrainFlow</span>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="font-sans text-sm tracking-tight font-semibold text-slate-900 dark:text-slate-100">Document / Title</span>
<span class="text-[10px] uppercase tracking-widest text-outline-variant px-1.5 py-0.5 rounded border border-outline-variant/20">已保存</span>
</div>
</div>
<div class="flex items-center gap-1">
<button class="p-1.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors Active: opacity-70 transition-opacity">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="p-1.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors Active: opacity-70 transition-opacity">
<span class="material-symbols-outlined">redo</span>
</button>
<div class="w-2"></div>
<button class="flex items-center gap-2 px-3 py-1 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors Active: opacity-70 transition-opacity">
<span class="material-symbols-outlined">file_download</span>
<span class="font-sans text-xs font-medium">Export</span>
</button>
</div>
</header>
<!-- SideNavBar (Left) -->
<aside class="fixed left-0 top-0 h-screen w-64 border-r border-slate-200/20 dark:border-slate-800/20 bg-slate-50 dark:bg-slate-950 flex flex-col py-8 px-4 gap-8 pt-16">
<section>
<h3 class="font-sans text-xs uppercase tracking-widest text-outline-variant mb-4 px-4">Hierarchy</h3>
<nav class="flex flex-col gap-1">
<div class="flex items-center gap-3 py-2 px-4 text-slate-900 dark:text-slate-100 border-l-2 border-slate-400 hover:text-slate-900 dark:hover:white transition-all hover:translate-x-1 duration-200 cursor-pointer">
<span class="material-symbols-outlined">account_tree</span>
<span class="font-sans text-xs font-medium">Main Concept</span>
</div>
<div class="flex items-center gap-3 py-2 text-slate-400 dark:text-slate-600 pl-4 hover:text-slate-900 dark:hover:white transition-all hover:translate-x-1 duration-200 cursor-pointer">
<span class="material-symbols-outlined">keyboard</span>
<span class="font-sans text-xs font-medium">Shortcuts</span>
</div>
</nav>
</section>
<section class="mt-auto">
<h3 class="font-sans text-xs uppercase tracking-widest text-outline-variant mb-4 px-4">快捷键</h3>
<div class="space-y-3 px-4">
<div class="flex justify-between items-center">
<span class="text-[11px] text-on-surface-variant font-medium">添加子节点</span>
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[10px] font-mono text-secondary">Tab</kbd>
</div>
<div class="flex justify-between items-center">
<span class="text-[11px] text-on-surface-variant font-medium">添加同级节点</span>
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[10px] font-mono text-secondary">Enter</kbd>
</div>
<div class="flex justify-between items-center">
<span class="text-[11px] text-on-surface-variant font-medium">编辑文本</span>
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[10px] font-mono text-secondary">F2</kbd>
</div>
<div class="flex justify-between items-center">
<span class="text-[11px] text-on-surface-variant font-medium">删除节点</span>
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[10px] font-mono text-secondary">Del</kbd>
</div>
</div>
</section>
<button class="mx-4 mt-4 py-2 bg-primary text-on-primary rounded-lg font-sans text-xs font-semibold shadow-sm hover:opacity-90 transition-opacity">
            New Node
        </button>
</aside>
<!-- Main Content Canvas -->
<main class="ml-64 mr-72 mt-12 h-[calc(100vh-3rem)] relative canvas-grid overflow-hidden flex items-center justify-center">
<!-- SVG Canvas for Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<!-- Central Node to Top Right -->
<path class="organic-line" d="M 50% 50% Q 60% 45% 70% 35%" style="d: path('M 500 450 Q 600 400 700 300')"></path>
<!-- Central Node to Right (Accent) -->
<path class="organic-line-accent" d="M 520 450 Q 650 450 780 450"></path>
<!-- Central Node to Bottom Right -->
<path class="organic-line" d="M 500 450 Q 600 500 700 600"></path>
<!-- Central Node to Left -->
<path class="organic-line" d="M 480 450 Q 350 450 220 450"></path>
</svg>
<!-- Nodes Layer -->
<div class="relative w-full h-full">
<!-- Root Node -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-surface-container-lowest border border-outline-variant/30 px-8 py-4 rounded-xl shadow-xl shadow-slate-900/5 ring-4 ring-primary/5 z-10">
<h1 class="font-headline text-2xl font-semibold text-on-surface">BrainFlow 架构</h1>
</div>
<!-- Sub Node 1 (Accent) -->
<div class="absolute top-1/2 left-[75%] -translate-y-1/2 bg-primary text-on-primary px-5 py-2.5 rounded-lg shadow-lg shadow-primary/20 z-10">
<span class="font-body text-sm font-medium">核心渲染引擎</span>
</div>
<!-- Sub Node 2 -->
<div class="absolute top-[30%] left-[65%] bg-surface-container-lowest border border-outline-variant/20 px-5 py-2.5 rounded-lg shadow-sm hover:border-outline-variant/50 transition-all cursor-pointer">
<span class="font-body text-sm text-on-surface-variant">用户界面系统</span>
</div>
<!-- Sub Node 3 -->
<div class="absolute top-[65%] left-[65%] bg-surface-container-lowest border border-outline-variant/20 px-5 py-2.5 rounded-lg shadow-sm hover:border-outline-variant/50 transition-all cursor-pointer">
<span class="font-body text-sm text-on-surface-variant">数据持久化</span>
</div>
<!-- Sub Node 4 -->
<div class="absolute top-1/2 left-[15%] -translate-y-1/2 bg-surface-container-lowest border border-outline-variant/20 px-5 py-2.5 rounded-lg shadow-sm hover:border-outline-variant/50 transition-all cursor-pointer">
<span class="font-body text-sm text-on-surface-variant">工作流集成</span>
</div>
</div>
<!-- Zoom Controls -->
<div class="absolute bottom-8 right-8 flex flex-col bg-surface-container-lowest/80 backdrop-blur-md rounded-lg border border-outline-variant/20 shadow-lg p-1 gap-1">
<button class="p-2 hover:bg-surface-container-high rounded-md transition-colors"><span class="material-symbols-outlined">add</span></button>
<div class="h-[1px] bg-outline-variant/10 mx-2"></div>
<button class="p-2 hover:bg-surface-container-high rounded-md transition-colors"><span class="material-symbols-outlined">remove</span></button>
<div class="h-[1px] bg-outline-variant/10 mx-2"></div>
<button class="p-2 hover:bg-surface-container-high rounded-md transition-colors"><span class="material-symbols-outlined">center_focus_strong</span></button>
</div>
</main>
<!-- SideNavBar (Right) - Property Inspector -->
<aside class="fixed right-0 top-12 h-[calc(100vh-3rem)] w-72 border-l border-slate-200/20 dark:border-slate-800/20 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md flex flex-col p-6 gap-6">
<header class="flex flex-col gap-1">
<div class="flex items-center justify-between mb-2">
<span class="font-serif text-sm text-slate-800 dark:text-slate-200">属性</span>
<span class="material-symbols-outlined text-outline-variant">tune</span>
</div>
<p class="font-sans text-[11px] font-medium text-slate-500 dark:text-slate-400">Node Config</p>
</header>
<nav class="flex bg-surface-container rounded-lg p-1 gap-1">
<button class="flex-1 py-1.5 text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-800 rounded-md shadow-sm font-sans text-[11px] font-medium Active: scale-95 transition-transform">属性</button>
<button class="flex-1 py-1.5 text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-md font-sans text-[11px] font-medium Active: scale-95 transition-transform">图层</button>
<button class="flex-1 py-1.5 text-slate-400 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-md font-sans text-[11px] font-medium Active: scale-95 transition-transform">笔记</button>
</nav>
<section class="space-y-6 overflow-y-auto">
<div class="space-y-3">
<label class="text-[11px] font-semibold text-on-surface-variant block">方向</label>
<div class="grid grid-cols-3 gap-2">
<button class="py-2 rounded-lg bg-primary text-on-primary text-[10px] font-medium border border-primary">自动</button>
<button class="py-2 rounded-lg bg-surface-container-lowest text-on-surface-variant text-[10px] font-medium border border-outline-variant/10 hover:border-outline-variant/30">左</button>
<button class="py-2 rounded-lg bg-surface-container-lowest text-on-surface-variant text-[10px] font-medium border border-outline-variant/10 hover:border-outline-variant/30">右</button>
</div>
</div>
<div class="space-y-3">
<label class="text-[11px] font-semibold text-on-surface-variant block">备注</label>
<textarea class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/15 focus:ring-primary/40 rounded-lg text-xs p-3 text-on-surface resize-none" placeholder="输入节点详细说明..." rows="4"></textarea>
</div>
<div class="space-y-3">
<label class="text-[11px] font-semibold text-on-surface-variant block">操作</label>
<div class="flex flex-col gap-2">
<button class="flex items-center justify-center gap-2 w-full py-2.5 rounded-lg bg-surface-container-high text-on-surface text-[11px] font-semibold transition-colors hover:bg-surface-container-highest">
<span class="material-symbols-outlined !text-[16px]">add_circle</span>
                        添加子节点
                    </button>
<button class="flex items-center justify-center gap-2 w-full py-2.5 rounded-lg bg-on-error/30 text-error text-[11px] font-semibold transition-colors hover:bg-error-container/20">
<span class="material-symbols-outlined !text-[16px]">delete</span>
                        删除节点
                    </button>
</div>
</div>
</section>
<section class="mt-auto pt-6 border-t border-outline-variant/10">
<div class="p-4 bg-surface-container-low rounded-xl">
<h4 class="text-[11px] font-semibold text-on-surface mb-2">样式建议</h4>
<p class="text-[10px] text-on-surface-variant leading-relaxed">
                    当前节点建议使用<span class="text-primary font-medium">深色模式</span>以突出层级结构。
                </p>
</div>
</section>
</aside>
</body></html>
